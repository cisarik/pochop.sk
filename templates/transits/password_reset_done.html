{% extends "transits/base.html" %}

{% block title %}E-mail odoslaný - Pochop{% endblock %}

{% block content %}
<section class="hero" style="padding: 56px 20px 28px;">
    <div class="hero-bg"><div class="stars"></div><div class="stars2"></div></div>
    <div class="hero-content">
        <div class="hero-shell" style="max-width: 680px;">
            <h1 class="hero-title" style="font-size: clamp(1.35rem,4vw,2rem); margin-bottom: 10px;">Ak účet existuje, poslali sme e-mail</h1>
            <p class="hero-subtitle">Skontrolujte schránku a kliknite na odkaz pre nastavenie nového hesla.</p>
            <div class="hero-actions" style="margin-top: 20px;">
                <a href="{% url 'transits:login' %}" class="btn-outline btn-hero" style="max-width: 280px; width: 100%;">Späť na prihlásenie</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
