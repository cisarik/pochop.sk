{% extends "transits/base.html" %}

{% block title %}Dočasný výpadok - Pochop{% endblock %}

{% block content %}
<section class="moment-wrap">
    <article class="moment-card" style="max-width: 860px; margin: 56px auto 90px; padding: 34px 28px; text-align:center;">
        <p class="moment-kicker">Dočasné obmedzenie služby</p>
        <h1 style="font-family: var(--font-d); font-size: clamp(1.7rem, 3vw, 2.4rem); margin-bottom: 10px;">Ospravedlňujeme sa, stránka má výpadok</h1>
        <p style="color: rgba(228,215,246,.86); max-width: 620px; margin: 0 auto; line-height:1.7;">
            Momentálne sme dosiahli denný limit AI volaní. Prosím, skúste to znova neskôr.
        </p>
    </article>
</section>
{% endblock %}
