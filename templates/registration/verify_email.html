<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pochop.sk - potvrdenie e-mailu</title>
</head>
<body style="margin:0;padding:0;background:#07070d;font-family:Inter,Segoe UI,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#07070d;padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:100%;border-radius:22px;overflow:hidden;border:1px solid rgba(198,154,255,.28);background:linear-gradient(155deg,#1a1330,#0f0d1d);box-shadow:0 18px 60px rgba(8,6,20,.55);">
          <tr>
            <td style="padding:28px 28px 18px;background:radial-gradient(circle at 18% 30%,rgba(184,126,255,.24),transparent 42%),radial-gradient(circle at 82% 22%,rgba(116,92,255,.2),transparent 40%);">
              <div style="font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#c9afea;margin-bottom:8px;">Pochop.sk</div>
              <h1 style="margin:0;color:#f4ebff;font-size:30px;line-height:1.2;font-weight:700;">Potvrďte svoj e-mail</h1>
              <p style="margin:10px 0 0;color:#d9c9ee;font-size:16px;line-height:1.65;">
                Ahoj {{ user.username }}, ďakujeme za registráciu.<br>
                Aktivujte účet kliknutím na tlačidlo nižšie.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:6px 28px 28px;">
              <table role="presentation" cellspacing="0" cellpadding="0" style="margin: 10px 0 16px;">
                <tr>
                  <td>
                    <a href="{{ verify_url }}" style="display:inline-block;padding:14px 24px;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#6366f1);color:#fff;text-decoration:none;font-weight:700;font-size:15px;letter-spacing:.01em;">Potvrdiť e-mail</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0;color:#bda9d7;font-size:13px;line-height:1.65;">
                Ak tlačidlo nefunguje, skopírujte tento odkaz do prehliadača:<br>
                <a href="{{ verify_url }}" style="color:#c8a9ff;text-decoration:none;word-break:break-all;">{{ verify_url }}</a>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:14px 28px 24px;border-top:1px solid rgba(200,162,255,.2);font-size:12px;color:#9f8eb7;line-height:1.6;">
              Ak ste sa neregistrovali vy, tento e-mail môžete ignorovať.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
